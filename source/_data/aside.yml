- name: wechat
  id: card-widget-wechat
  class: contact-card
  icon: fas fa-qrcode
  title: 微信咨询
  content_html: |
    <div class="wechat-contact-card" id="wechat-contact">
      <img class="wechat-contact-qr" src="/img/wechat-contact.jpg" alt="微信二维码：小编 AI">
      <div class="wechat-contact-title">扫码添加小编 AI</div>
      <div class="wechat-contact-desc">模型配置、插件安装、案例复现遇到问题，都可以扫码咨询。</div>
      <div class="wechat-contact-note">添加时请备注：OpenClaw</div>
    </div>

- name: learningPath
