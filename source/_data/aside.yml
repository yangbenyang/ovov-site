  icon: fas fa-route
  title: 学习路径
  content_html: |
    <div class="learning-path-list">
      <a href="/categories/入门教程/"><span>01</span><strong>配置模型</strong><em>API Key、模型地址与模型 ID</em></a>
      <a href="/plugins/"><span>02</span><strong>下载插件</strong><em>获取设计、办公、社媒插件包</em></a>
      <a href="/plugins/#install"><span>03</span><strong>安装插件</strong><em>复制指令，让 OpenClaw 自动安装</em></a>
      <a href="/categories/网页设计/"><span>04</span><strong>跟做案例</strong><em>网页、PPT、文档、动效实战</em></a>
      <a href="/#wechat-contact"><span>05</span><strong>微信支持</strong><em>不会配置时备注 OpenClaw</em></a>
